# apps/bot/fly.toml

app = "copysignal-bot-engine"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "3001"
  NODE_ENV = "production"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false   # CRITICAL — never let the bot machine stop
  auto_start_machines = true
  min_machines_running = 1     # Always keep at least 1 machine alive

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
